server:
  port: 8080

spring:
  application:
    name: reduction-plan-service

  datasource:
    url: jdbc:h2:mem:reductionplans
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

    consumer:
      group-id: reduction-plan-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.reductionplan.domain
        spring.json.value.default.type: com.example.reductionplan.domain.ReductionPlanEvent
        spring.json.use.type.headers: false

app:
  messaging:
    publisher: logging
    consumer:
      enabled: false

  kafka:
    topics:
      reduction-plan-events: reduction-plan-events